# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate files.json and disable Jekyll
        run: |
          # Disable Jekyll so GitHub Pages serves files directly
          touch .nojekyll

          python3 << 'PYEOF'
          import os, json

          IGNORE = {'.git', '.github', 'node_modules', '.DS_Store'}

          def build_tree(root):
              tree = {}
              for dirpath, dirnames, filenames in os.walk(root, topdown=True):
                  dirnames[:] = sorted(d for d in dirnames if d not in IGNORE)
                  filenames   = sorted(f for f in filenames if f not in IGNORE and f != 'files.json')

                  rel = os.path.relpath(dirpath, root)
                  if rel == '.':
                      rel = ''

                  node = tree
                  if rel:
                      for part in rel.replace('\\', '/').split('/'):
                          node = node.setdefault(part, {})

                  node['__files__'] = [
                      {'name': f, 'size': os.path.getsize(os.path.join(dirpath, f))}
                      for f in filenames
                  ]
              return tree

          tree = build_tree('.')
          with open('files.json', 'w') as fh:
              json.dump(tree, fh, separators=(',', ':'))

          print(f"files.json written ({os.path.getsize('files.json')} bytes)")
          PYEOF

      - name: Verify
        run: |
          ls -la files.json .nojekyll
          python3 -c "import json; d=json.load(open('files.json')); print('Root keys:', list(d.keys()))"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
