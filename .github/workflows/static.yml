# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate files.json manifest
        run: |
          python3 - <<'EOF'
          import os, json

          IGNORE = {'.git', '.github', 'node_modules', '.DS_Store'}

          def build_tree(root):
              tree = {}
              for dirpath, dirnames, filenames in os.walk(root):
                  # Prune ignored dirs in-place so os.walk skips them
                  dirnames[:] = sorted(d for d in dirnames if d not in IGNORE)
                  filenames = sorted(f for f in filenames if f not in IGNORE)

                  rel = os.path.relpath(dirpath, root)
                  rel = '' if rel == '.' else rel

                  node = tree
                  if rel:
                      for part in rel.replace('\\', '/').split('/'):
                          node = node.setdefault(part, {})

                  node['__files__'] = [
                      {
                          'name': f,
                          'size': os.path.getsize(os.path.join(dirpath, f))
                      }
                      for f in filenames
                      if f != 'files.json'
                  ]

              return tree

          tree = build_tree('.')
          with open('files.json', 'w') as fh:
              json.dump(tree, fh, separators=(',', ':'))

          print('files.json written')
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
